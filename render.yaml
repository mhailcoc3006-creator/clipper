# Render.com deployment configuration for Flask app
services:
  - type: web
    name: clipper
    env: python
    plan: free
    startCommand: python main.py
    envVars:
      - key: FLASK_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
      - key: PYTHON_VERSION
        value: 3.11
    buildCommand: pip install -r requirements.txt
    routes:
      - path: /
        matchType: prefix
